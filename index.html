<body>

<!-- ══ HEADER ══════════════════════════════════════════════ -->
<header id="app-header">
  <div class="header-inner">
    <button class="logo-btn" onclick="goHome()">
      Conduta<span class="logo-dot">.</span>
    </button>
    <div class="header-stats" id="header-stats">
      <!-- Preenchido por renderHeaderStats() -->
    </div>
  </div>
</header>

<!-- ══ MAIN ════════════════════════════════════════════════ -->
<main id="app-main">
  <section class="view" id="view-onboarding" style="display:none"></section>
  <section class="view" id="view-home"       style="display:none"></section>
  <section class="view" id="view-archive"    style="display:none"></section>
  <section class="view" id="view-league"     style="display:none"></section>
  <section class="view" id="view-profile"    style="display:none"></section>
  <section class="view" id="view-case"       style="display:none"></section>
  <section class="view" id="view-result"     style="display:none"></section>
</main>

<!-- ══ NAV INFERIOR ════════════════════════════════════════ -->
<nav id="bottom-nav" style="display:none"></nav>

<!-- ══ MODAIS ══════════════════════════════════════════════ -->

<!-- Modal de login -->
<div class="modal-backdrop" id="modal-login" style="display:none" onclick="if(event.target===this)closeModal('login')">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal('login')" aria-label="Fechar">✕</button>
    <h2 class="modal-title" id="login-title">Entrar</h2>
    <p class="modal-desc">Salve seu streak e seu histórico em qualquer dispositivo.</p>

    <button class="btn-google" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.3-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.2 35 26.7 36 24 36c-5.3 0-9.7-3.1-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.1 5.5l6.3 5.3C41.7 34.5 44 29.6 44 24c0-1.2-.1-2.3-.4-3.5z"/>
      </svg>
      Entrar com Google
    </button>

    <div class="login-divider"><span>ou</span></div>

    <form id="login-ep-form" onsubmit="handleEmailPasswordSubmit(event)">
      <input type="email" id="lg-email" class="text-input" placeholder="seu@email.com" autocomplete="email" required>
      <input type="password" id="lg-password" class="text-input" placeholder="senha" autocomplete="current-password" required>
      <button type="submit" id="lg-submit" class="btn-primary">Entrar</button>
    </form>

    <div class="login-switch">
      <button class="btn-link" data-login-mode="signin" onclick="setLoginMode('signup')">Não tenho conta — criar</button>
      <button class="btn-link" data-login-mode="signup" style="display:none" onclick="setLoginMode('signin')">Já tenho conta — entrar</button>
      <button class="btn-link" onclick="setLoginMode('magic')">Esqueci a senha</button>
    </div>

    <details data-login-mode="magic" style="display:none" open>
      <summary style="display:none">Magic link</summary>
      <form id="login-form" onsubmit="handleLoginSubmit(event)">
        <input type="email" id="login-email" class="text-input" placeholder="seu@email.com" autocomplete="email" required>
        <button type="submit" id="login-submit-btn" class="btn-ghost">Enviar magic link</button>
      </form>
      <p class="modal-fine">Receba um link no email pra entrar sem senha.</p>
    </details>
  </div>
</div>

<!-- Modal de conta (logado) -->
<div class="modal-backdrop" id="modal-account" style="display:none" onclick="if(event.target===this)closeModal('account')">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal('account')" aria-label="Fechar">✕</button>
    <h2 class="modal-title">Sua conta</h2>
    <p class="modal-desc"><span id="account-email-display"></span></p>
    <button class="btn-ghost" onclick="logout(); closeModal('account')">Sair</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" style="display:none"></div>

</html>
